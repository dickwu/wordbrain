name: Update Homebrew Cask

# Runs after a GitHub release is published (by release.yml) or on manual
# workflow_dispatch. Downloads the universal macOS DMG, computes sha256, and
# writes Casks/wordbrain.rb into the shared tap repo at dickwu/homebrew-tap
# (same tap r2 uses) via `gh api PUT`. End users install with:
#   brew install dickwu/tap/wordbrain
#
# Injection safety: every ${{ ... }} expression is captured in an `env:` block
# first and referenced via $VAR in run: steps, per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
#
# Prerequisites (one-time): the tap repo dickwu/homebrew-tap already exists
# from the r2 project. Create a fine-grained PAT scoped to that tap repo,
# Contents: Read and write, and save as the HOMEBREW_TAP_TOKEN secret on
# dickwu/wordbrain.
#
# DMG filename assumption: Tauri 2.x + productName "WordBrain" + target
# universal-apple-darwin produces WordBrain_<version>_universal.dmg. The
# release.yml collect step (line 86) globs all *.dmg from the bundle dir, so
# this is the only DMG present for macOS. Adjust DMG_NAME below if a future
# Tauri release changes the naming convention.

on:
  # `release: published` is intentionally NOT used here. Releases created by
  # release.yml use the default GITHUB_TOKEN, and GitHub blocks downstream
  # workflows from firing on token-created events as an anti-recursion safety.
  # `workflow_run` is special-cased and DOES fire regardless of token, so we
  # piggyback on release.yml's completion instead.
  workflow_run:
    workflows: [release]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to Homebrew (for example v0.1.1)
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    # workflow_run fires on every completion (success or fail). Skip the failed
    # ones; manual dispatches always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    env:
      DISPATCH_TAG: ${{ inputs.tag }}
      WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      TAP_OWNER: dickwu
      TAP_REPO: homebrew-tap
      APP_REPO: dickwu/wordbrain
    steps:
      - name: Resolve tag + version
        id: resolve
        run: |
          # workflow_run reports the triggering ref via head_branch; for our
          # release.yml that ref is the tag (e.g. "v0.1.7"). Manual dispatches
          # supply the tag input directly.
          TAG="${DISPATCH_TAG:-$WORKFLOW_RUN_HEAD_BRANCH}"
          case "$TAG" in
            v[0-9]*)
              ;;
            *)
              echo "::error::Refusing to proceed with non-semver tag: $TAG"
              exit 1
              ;;
          esac
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download DMG + compute sha256
        id: sha
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          DMG_NAME="WordBrain_${VERSION}_universal.dmg"
          echo "dmg=${DMG_NAME}" >> "$GITHUB_OUTPUT"
          curl -fsSL "https://github.com/${APP_REPO}/releases/download/${TAG}/${DMG_NAME}" -o universal.dmg
          SHA="$(sha256sum universal.dmg | cut -d ' ' -f1)"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Write cask to tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > /tmp/wordbrain.rb <<EOF
          cask "wordbrain" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${APP_REPO}/releases/download/v#{version}/WordBrain_#{version}_universal.dmg"
            name "WordBrain"
            desc "Local-first English vocabulary builder with FSRS review and word-network graphs"
            homepage "https://github.com/${APP_REPO}"
            license "MIT"

            app "WordBrain.app"

            zap trash: [
              "~/Library/Application Support/com.lifefarmer.wordbrain",
              "~/Library/Caches/com.lifefarmer.wordbrain",
              "~/Library/Preferences/com.lifefarmer.wordbrain.plist",
              "~/Library/Saved Application State/com.lifefarmer.wordbrain.savedState",
            ]
          end
          EOF

          ENCODED="$(base64 -w 0 /tmp/wordbrain.rb)"
          EXISTING_SHA="$(gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/Casks/wordbrain.rb" --jq '.sha' 2>/dev/null || true)"

          if [ -n "${EXISTING_SHA}" ]; then
            gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/Casks/wordbrain.rb" \
              --method PUT \
              --field message="chore: update wordbrain cask to ${VERSION}" \
              --field content="${ENCODED}" \
              --field sha="${EXISTING_SHA}"
          else
            gh api "repos/${TAP_OWNER}/${TAP_REPO}/contents/Casks/wordbrain.rb" \
              --method PUT \
              --field message="chore: add wordbrain cask ${VERSION}" \
              --field content="${ENCODED}"
          fi
