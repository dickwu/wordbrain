name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

# Opt every JS-based action (checkout, upload-artifact, download-artifact, …)
# onto Node 24 ahead of the June 2 2026 forced cutover. Removes the deprecation
# warning and lets us drop the env var when v5+ majors land.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
            bundles: app,dmg,updater
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            bundles: deb,appimage,updater
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            bundles: msi,updater

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # rustup doesn't know `universal-apple-darwin` — it's a Tauri CLI
      # virtual target that combines arm64 + x64 via lipo. Install both real
      # targets on macOS; use matrix.target as-is on Linux / Windows.
      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev \
            libsoup-3.0-dev build-essential \
            libpipewire-0.3-dev

      - name: Install JS deps
        run: bun install --frozen-lockfile

      # The dev-connector capability lives in `src-tauri/capabilities-dev/`
      # (outside tauri-build's default `./capabilities/**/*` auto-load glob)
      # and is registered at runtime via `app.add_capability(...)` in
      # `src/lib.rs` only when the `dev-connector` feature is on. Release
      # builds use `--no-default-features` (no `dev-connector`), so neither
      # the plugin nor the capability are loaded — no manual cleanup needed.

      # Force bash so `$TAURI_ARGS` expands correctly on Windows (default
      # PowerShell reads `$VAR` as PowerShell syntax, not env-var expansion).
      # dev-connector is not in Cargo.toml's default feature set, so a plain
      # `tauri build` excludes xcap / libspa / aws-sdk-s3.
      - name: Build & bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple notarization is intentionally NOT wired here. Empty
          # APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY env vars trigger Tauri's
          # codesign path with bogus inputs ("failed to import keychain
          # certificate"). Re-add APPLE_* env vars only when valid Developer
          # ID secrets are configured on the repo. Without them the macOS
          # build is unsigned — users see a Gatekeeper warning but the app
          # installs.
          TAURI_ARGS: ${{ matrix.args }}
          TAURI_BUNDLES: ${{ matrix.bundles }}
        run: bun run tauri build $TAURI_ARGS --bundles $TAURI_BUNDLES

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p dist-release
          # `find` instead of bash-4 `shopt -s globstar`: macOS GitHub runners
          # ship Apple's bash 3.2 (frozen at GPLv3) which has no globstar.
          find src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" \
               -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
               -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \
               -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \) \
            -path "*/release/bundle/*" -exec cp -v {} dist-release/ \;
          ls -la dist-release

      - uses: actions/upload-artifact@v4
        with:
          name: wordbrain-${{ matrix.os }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      REPO_SLUG: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="$REF_NAME"
          if [ -z "$TAG" ] || [[ "$TAG" != v* ]]; then
            TAG="$INPUT_TAG"
          fi
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse semver from tag '$TAG'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, pathlib, datetime
          version = os.environ["VERSION"]
          repo = os.environ["REPO_SLUG"]
          dist = pathlib.Path("dist-release")
          # Tauri's updater queries platform keys as `<os>-<arch>` (e.g.
          # `darwin-aarch64`, `darwin-x86_64`) — `darwin-universal` is not in
          # its fallback chain. Map both arch keys to the same universal
          # `.app.tar.gz` so Apple Silicon and Intel macs both resolve.
          pairs = [
              ("darwin-aarch64",  "*.app.tar.gz.sig"),
              ("darwin-x86_64",   "*.app.tar.gz.sig"),
              ("darwin-universal","*.app.tar.gz.sig"),
              ("windows-x86_64",  "*.msi.zip.sig"),
              ("linux-x86_64",    "*.AppImage.tar.gz.sig"),
          ]
          platforms = {}
          for key, sig_glob in pairs:
              for sig in dist.glob(sig_glob):
                  base = sig.name[:-4]
                  platforms[key] = {
                      "signature": sig.read_text().strip(),
                      "url": f"https://github.com/{repo}/releases/download/v{version}/{base}",
                  }
          manifest = {
              "version": version,
              "notes": f"WordBrain {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          (dist / "latest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WordBrain ${{ steps.version.outputs.version }}
          body: |
            WordBrain v${{ steps.version.outputs.version }}

            - macOS: `.dmg` + universal `.app.tar.gz` (auto-updater)
            - Windows: `.msi` + `.msi.zip` (auto-updater)
            - Linux: `.deb` + `.AppImage` + `.AppImage.tar.gz` (auto-updater)

            Auto-update manifest: `latest.json`.
          files: |
            dist-release/*
          fail_on_unmatched_files: true
