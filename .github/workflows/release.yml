name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
            bundles: app,dmg,updater
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
            bundles: deb,appimage,updater
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
            bundles: msi,updater

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev \
            libsoup-3.0-dev build-essential

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build & bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_ARGS: ${{ matrix.args }}
          TAURI_BUNDLES: ${{ matrix.bundles }}
        run: bun run tauri build $TAURI_ARGS --bundles $TAURI_BUNDLES

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p dist-release
          shopt -s globstar nullglob
          for f in src-tauri/target/**/release/bundle/**/*.{dmg,msi,deb,AppImage,app.tar.gz,app.tar.gz.sig,msi.zip,msi.zip.sig,AppImage.tar.gz,AppImage.tar.gz.sig}; do
            cp -v "$f" dist-release/
          done
          ls -la dist-release

      - uses: actions/upload-artifact@v4
        with:
          name: wordbrain-${{ matrix.os }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      REPO_SLUG: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="$REF_NAME"
          if [ -z "$TAG" ] || [[ "$TAG" != v* ]]; then
            TAG="$INPUT_TAG"
          fi
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse semver from tag '$TAG'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, pathlib, datetime
          version = os.environ["VERSION"]
          repo = os.environ["REPO_SLUG"]
          dist = pathlib.Path("dist-release")
          pairs = [
              ("darwin-universal", "*.app.tar.gz.sig"),
              ("windows-x86_64",  "*.msi.zip.sig"),
              ("linux-x86_64",    "*.AppImage.tar.gz.sig"),
          ]
          platforms = {}
          for key, sig_glob in pairs:
              for sig in dist.glob(sig_glob):
                  base = sig.name[:-4]
                  platforms[key] = {
                      "signature": sig.read_text().strip(),
                      "url": f"https://github.com/{repo}/releases/download/v{version}/{base}",
                  }
          manifest = {
              "version": version,
              "notes": f"WordBrain {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          (dist / "latest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WordBrain ${{ steps.version.outputs.version }}
          body: |
            WordBrain v${{ steps.version.outputs.version }}

            - macOS: `.dmg` + universal `.app.tar.gz` (auto-updater)
            - Windows: `.msi` + `.msi.zip` (auto-updater)
            - Linux: `.deb` + `.AppImage` + `.AppImage.tar.gz` (auto-updater)

            Auto-update manifest: `latest.json`.
          files: |
            dist-release/*
          fail_on_unmatched_files: true
