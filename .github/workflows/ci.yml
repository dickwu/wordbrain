name: ci

on:
  push:
    branches: [main, phase-*]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev \
            libsoup-3.0-dev build-essential

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: Vitest
        run: bun run test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Rust test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Next.js build (static export)
        run: bun run build

      - name: Tauri build sanity (debug, no bundle)
        run: bun run tauri build --debug --no-bundle
